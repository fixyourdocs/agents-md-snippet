name: snippet-drift

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Self-test snippet
        run: python3 .github/scripts/check-snippet.py
